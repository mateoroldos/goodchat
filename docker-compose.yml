services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: goodchat
      POSTGRES_PASSWORD: goodchat
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodchat -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: goodchat
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pgoodchat"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
