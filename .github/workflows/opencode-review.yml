name: opencode-pr-review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '/oc review') ||
        startsWith(github.event.comment.body, '/opencode review')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run opencode PR review
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/gpt-5.5-codex
          use_github_token: true
          prompt: |
            You are doing a senior-level pull request review.

            Review only this pull request. Focus on changed behavior, regressions,
            security problems, broken edge cases, missing tests for changed logic,
            and maintainability issues that would matter in production.

            Be conservative:
            - Do not comment on style, formatting, naming, or preferences.
            - Do not invent issues.
            - Do not flag hypothetical problems unless the diff makes them likely.
            - Before reporting an issue, inspect the relevant changed file and nearby callers.
            - If confidence is below 90%, do not report it.
            - Prefer fewer, higher-quality findings.

            For each finding include:
            - Severity: critical, high, medium, or low
            - File and line
            - Why it matters
            - Suggested fix
            - Whether it should block merge

            Also evaluate:
            - Whether the PR is self-contained
            - Whether unrelated changes are mixed in
            - Whether tests match the changed behavior

            Output format:
            1. Verdict: LGTM / Needs attention / Block merge
            2. Summary
            3. Findings
            4. Test coverage notes
            5. Reviewability notes
